name: Deploy Squad Dashboard

on:
  push:
    branches:
      - main
      - feature/squad-productivity-dashboard
    paths:
      - 'squad-dashboard/**'
      - '.github/workflows/deploy-squad-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: squad-dashboard/package-lock.json

      - run: npm ci
        working-directory: squad-dashboard

      - name: Generate GitHub data
        run: node scripts/generate-github-data.mjs
        working-directory: squad-dashboard
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run build
        working-directory: squad-dashboard

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: squad-dashboard/dist

      - uses: actions/deploy-pages@v4
        id: deployment
