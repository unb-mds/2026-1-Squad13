name: Update Squad Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dashboard deploy
        run: gh workflow run deploy-squad-dashboard.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
