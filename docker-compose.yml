services:
  db:
    image: postgres:16-alpine
    container_name: monitor_postgres
    restart: always
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: monitor_pgadmin
    restart: always
    env_file:
      - backend/.env
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data:
